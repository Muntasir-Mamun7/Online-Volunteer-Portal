<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NJUPT Int. Student Volunteer Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800">
    <header class="bg-white shadow-sm border-b border-slate-200">
      <div class="mx-auto max-w-6xl px-4 py-4 md:px-6">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div class="flex items-center gap-3">
            <img
              src="njupt-logo.jpg"
              alt="NJUPT Logo"
              class="h-12 w-12 rounded object-cover ring-1 ring-slate-200"
            />
            <h1 class="text-lg font-semibold tracking-tight md:text-2xl">
              NJUPT Int. Student Volunteer Portal
            </h1>
          </div>

          <div class="flex w-full gap-2 md:w-auto">
            <label class="w-full md:w-80">
              <span class="sr-only">Search</span>
              <input
                id="searchInput"
                type="search"
                placeholder="Search by name or ID"
                class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
              />
            </label>
            <button
              id="clearSearchBtn"
              type="button"
              class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
            >
              Clear
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-6 md:px-6">
      <!-- Admin Panel — only visible when ?admin=1 -->
      <section id="adminPanel" class="hidden mb-4 rounded-xl border border-blue-200 bg-blue-50 px-4 py-3 shadow-sm md:px-6">
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
          <p class="text-sm font-medium text-blue-800">Admin Mode — click any cell to edit</p>
          <div class="flex flex-wrap gap-2">
            <button
              id="undoBtn"
              type="button"
              disabled
              title="Undo (Ctrl+Z)"
              class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-40"
            >
              ↩ Undo
            </button>
            <button
              id="redoBtn"
              type="button"
              disabled
              title="Redo (Ctrl+Y)"
              class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-40"
            >
              ↪ Redo
            </button>
            <button
              id="addRowBtn"
              type="button"
              class="rounded-md bg-green-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-green-700"
            >
              + Add Row
            </button>
            <button
              id="saveGitHubBtn"
              type="button"
              class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-indigo-700"
            >
              💾 Save to GitHub
            </button>
            <button
              id="configTokenBtn"
              type="button"
              title="Set GitHub token for saving"
              class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
            >
              ⚙ Token
            </button>
            <button
              id="resetDataBtn"
              type="button"
              class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
            >
              Reset Data
            </button>
            <button
              id="adminLogoutBtn"
              type="button"
              class="rounded-md border border-red-300 bg-white px-3 py-2 text-sm font-medium text-red-600 transition hover:bg-red-50"
            >
              Exit Admin
            </button>
          </div>
        </div>
        <!-- Token configuration row — hidden by default, toggled by ⚙ Token button -->
        <div id="tokenConfigRow" class="hidden mt-3 flex flex-col gap-2 border-t border-blue-200 pt-3 md:flex-row md:items-center">
          <label class="text-xs font-medium text-blue-800 whitespace-nowrap">GitHub Token:</label>
          <input
            id="tokenInput"
            type="password"
            placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
            class="flex-1 rounded border border-slate-300 bg-white px-2 py-1 text-xs font-mono outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-200"
          />
          <button
            id="saveTokenBtn"
            type="button"
            class="rounded bg-blue-600 px-3 py-1 text-xs font-medium text-white hover:bg-blue-700"
          >
            Save Token
          </button>
          <button
            id="clearTokenBtn"
            type="button"
            class="rounded border border-slate-300 bg-white px-3 py-1 text-xs font-medium text-slate-700 hover:bg-slate-50"
          >
            Clear Token
          </button>
          <span id="tokenStatus" class="text-xs text-slate-500"></span>
        </div>
      </section>

      <section class="rounded-xl border border-slate-200 bg-white shadow-sm">
        <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3 md:px-6">
          <h2 class="text-base font-semibold md:text-lg">Volunteer Hours Table</h2>
          <button
            id="downloadReportBtn"
            type="button"
            aria-label="Download volunteer report as CSV"
            class="rounded-md bg-blue-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-blue-700"
          >
            Export CSV
          </button>
        </div>

        <div class="overflow-x-auto">
          <table class="min-w-full text-left text-sm">
            <thead class="bg-slate-100 text-slate-700 select-none">
              <tr>
                <th data-col="rank" class="cursor-pointer whitespace-nowrap px-4 py-3 font-semibold md:px-6">Rank <span class="sort-icon text-slate-400"></span></th>
                <th data-col="name" class="cursor-pointer whitespace-nowrap px-4 py-3 font-semibold md:px-6">Name <span class="sort-icon text-slate-400"></span></th>
                <th data-col="studentId" class="cursor-pointer whitespace-nowrap px-4 py-3 font-semibold md:px-6">Student ID <span class="sort-icon text-slate-400"></span></th>
                <th data-col="totalHours" class="cursor-pointer whitespace-nowrap px-4 py-3 font-semibold md:px-6">Total Hours <span class="sort-icon text-slate-400"></span></th>
                <th class="px-4 py-3 font-semibold md:px-6">Achievement</th>
                <th id="actionCol" class="hidden px-4 py-3 font-semibold md:px-6"></th>
              </tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-slate-200"></tbody>
          </table>
        </div>

        <div class="flex flex-col gap-2 border-t border-slate-200 px-4 py-3 text-xs text-slate-600 md:flex-row md:items-center md:justify-between md:px-6">
          <p id="resultCount"></p>
          <p id="lastUpdate">Last Update: --</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
