<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NJUPT Int. Student Volunteer Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800">
    <header class="bg-white shadow-sm border-b border-slate-200">
      <div class="mx-auto max-w-6xl px-4 py-4 md:px-6">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div class="flex items-center gap-3">
            <img
              src="njupt-logo.jpg"
              alt="NJUPT Logo"
              class="h-12 w-12 rounded object-cover ring-1 ring-slate-200"
            />
            <h1 class="text-lg font-semibold tracking-tight md:text-2xl">
              NJUPT Int. Student Volunteer Portal
            </h1>
          </div>

          <div class="flex w-full gap-2 md:w-auto">
            <label class="w-full md:w-80">
              <span class="sr-only">Search</span>
              <input
                id="searchInput"
                type="search"
                placeholder="Search by name or ID"
                class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
              />
            </label>
            <button
              id="clearSearchBtn"
              type="button"
              class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
            >
              Clear
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-6 md:px-6">
      <section class="mb-4 grid gap-3 md:grid-cols-3">
        <div class="rounded-lg border border-slate-200 bg-white px-4 py-3 shadow-sm">
          <p class="text-xs text-slate-500">Total Students</p>
          <p id="totalStudents" class="text-xl font-semibold text-slate-900">0</p>
        </div>
        <div class="rounded-lg border border-slate-200 bg-white px-4 py-3 shadow-sm">
          <p class="text-xs text-slate-500">Total Volunteer Hours</p>
          <p id="totalHours" class="text-xl font-semibold text-slate-900">0</p>
        </div>
        <div class="rounded-lg border border-slate-200 bg-white px-4 py-3 shadow-sm">
          <p class="text-xs text-slate-500">Certificate Eligible</p>
          <p id="certificateCount" class="text-xl font-semibold text-slate-900">0</p>
        </div>
      </section>

      <section class="mb-4 rounded-xl border border-slate-200 bg-white px-4 py-3 shadow-sm md:px-6">
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
          <div>
            <p class="text-sm font-medium text-slate-800">Admin Control</p>
            <p id="adminStatus" class="text-xs text-slate-500">Viewing as guest (IDs are masked).</p>
          </div>
          <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
            <button
              id="enableAdminBtn"
              type="button"
              class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white transition hover:bg-black"
            >
              Enable Admin Mode
            </button>
            <button
              id="adminLogoutBtn"
              type="button"
              class="hidden rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
            >
              Exit Admin Mode
            </button>
          </div>
        </div>
      </section>

      <section class="rounded-xl border border-slate-200 bg-white shadow-sm">
        <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3 md:px-6">
          <h2 class="text-base font-semibold md:text-lg">Points Table</h2>
          <button
            id="downloadReportBtn"
            type="button"
            class="rounded-md bg-blue-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-blue-700"
          >
            Export CSV
          </button>
        </div>

        <div class="overflow-x-auto">
          <table class="min-w-full text-left text-sm">
            <thead class="bg-slate-100 text-slate-700">
              <tr>
                <th class="px-4 py-3 font-semibold md:px-6">Rank</th>
                <th class="px-4 py-3 font-semibold md:px-6">Name</th>
                <th class="px-4 py-3 font-semibold md:px-6">Student ID</th>
                <th class="px-4 py-3 font-semibold md:px-6">Total Hours</th>
                <th class="px-4 py-3 font-semibold md:px-6">Achievement</th>
              </tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-slate-200"></tbody>
          </table>
        </div>

        <div class="flex flex-col gap-2 border-t border-slate-200 px-4 py-3 text-xs text-slate-600 md:flex-row md:items-center md:justify-between md:px-6">
          <p id="resultCount"></p>
          <p id="lastUpdate">Last Update: --</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
